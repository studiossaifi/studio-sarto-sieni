<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Studio Sarto Sieni - Anagrafica Clienti</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f1f5f9;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:13px}
button{cursor:pointer}
.dn{display:none!important}
.hdr{background:#1e3a6e;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25);flex-wrap:wrap;gap:8px}
.hdr-logo{height:48px;object-fit:contain;background:#fff;border-radius:4px;padding:2px 6px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-info{color:#cbd5e1;font-size:12px}
.btn-hdr{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:5px 12px;font-size:12px}
.btn-hdr:hover{background:rgba(255,255,255,.22)}
.btn-grn{background:#16a34a;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700}
.btn-red{background:#dc2626;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700}
.pg-center{min-height:100vh;background:linear-gradient(145deg,#0f2550,#1e3a6e 50%,#1e40af);display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:#fff;border-radius:18px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.lcard-top{background:#1e3a6e;padding:28px 32px 24px;text-align:center}
.lcard-title{color:#fff;font-size:17px;font-weight:700;margin-top:14px}
.lcard-sub{color:#93c5fd;font-size:12px;margin-top:4px}
.lcard-body{padding:28px 32px}
.lfoot{background:#f8fafc;padding:14px 32px;text-align:center;color:#94a3b8;font-size:11px;border-top:1px solid #e2e8f0}
.lerr{color:#dc2626;font-size:12px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:8px 12px;margin-bottom:14px;text-align:center}
.fr{margin-bottom:14px}
.fr2{display:flex;gap:12px;margin-bottom:14px}
.fr3{display:flex;gap:12px;margin-bottom:14px}
.fr2>div,.fr3>div{flex:1;min-width:0}
.lbl{display:block;font-size:10px;font-weight:700;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:9px 11px;border:1.5px solid #e2e8f0;border-radius:8px;color:#1e293b;background:#fff}
.inp:focus{border-color:#1e3a6e;outline:none}
.inp:read-only{background:#f8fafc;color:#64748b;cursor:default}
textarea.inp{resize:vertical;height:80px}
.pw-wrap{position:relative}
.pw-wrap .inp{padding-right:38px}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:15px;color:#94a3b8}
.btn-blu{background:#1e3a6e;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700}
.btn-blu:hover{background:#2d5091}
.btn-sec{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 18px}
.btn-full{width:100%;padding:12px;font-size:14px}
.btn-sm-e{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:5px;padding:4px 10px;font-size:11px;margin-right:3px}
.btn-sm-d{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:5px;padding:4px 10px;font-size:11px}
.btn-sm-g{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:5px;padding:4px 10px;font-size:11px;margin-right:3px}
.ct{max-width:1300px;margin:0 auto;padding:20px 16px}
.pg-title{color:#1e3a6e;font-size:19px;font-weight:800;margin-bottom:4px}
.pg-sub{color:#64748b;font-size:12px;margin-bottom:20px}
.sec-title{color:#1e3a6e;font-size:12px;font-weight:800;margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid #e2e8f0;text-transform:uppercase;letter-spacing:.5px}
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.kc{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.kn{font-size:26px;font-weight:900;line-height:1}
.kl{font-size:11px;color:#64748b;margin-top:4px}
.abar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.search-wrap{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.search-inp{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;color:#1e293b;font-size:13px;min-width:220px}
.fi{padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;background:#fff;color:#1e293b;font-size:12px}
/* LISTA CLIENTI */
.cli-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:20px}
.cli-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #1e3a6e;transition:box-shadow .15s}
.cli-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.12)}
.cli-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cli-nome{font-size:15px;font-weight:800;color:#1e3a6e}
.cli-tipo{display:inline-block;background:#dbeafe;color:#1e40af;border-radius:10px;padding:2px 9px;font-size:10px;font-weight:700;text-transform:uppercase;margin-top:2px}
.cli-info{font-size:12px;color:#64748b;margin-top:6px;line-height:1.7}
.cli-actions{display:flex;gap:6px;margin-top:12px}
/* SCHEDA ANAGRAFICA */
.scheda{background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:20px}
.scheda-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.scheda-nome{font-size:20px;font-weight:800;color:#1e3a6e}
.scheda-actions{display:flex;gap:8px;flex-wrap:wrap}
.field-group{background:#f8fafc;border-radius:10px;padding:16px 20px;margin-bottom:14px}
.field-group-title{font-size:11px;font-weight:800;color:#1e3a6e;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(15,37,80,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.modal-sm{max-width:460px}
.mhdr{background:#1e3a6e;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;border-radius:16px 16px 0 0;position:sticky;top:0;z-index:10}
.mhdr-t{color:#fff;font-weight:700;font-size:15px}
.mcls{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;width:28px;height:28px;font-size:14px}
.mbdy{padding:24px}
.mft{padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;position:sticky;bottom:0;background:#fff;border-radius:0 0 16px 16px}
.ntf{background:#dcfce7;color:#15803d;text-align:center;padding:10px;font-size:13px;font-weight:700;border-bottom:2px solid #bbf7d0}
.ntf-e{background:#fee2e2;color:#b91c1c;text-align:center;padding:10px;font-size:13px;font-weight:700;border-bottom:2px solid #fecaca}
.spinner{border:3px solid #e2e8f0;border-top:3px solid #1e3a6e;border-radius:50%;width:36px;height:36px;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{margin-top:30px;text-align:center;color:#94a3b8;font-size:11px;border-top:1px solid #e2e8f0;padding-top:16px}
.empty{text-align:center;color:#94a3b8;padding:60px;background:#fff;border-radius:12px;font-size:14px}
.badge-mod{display:inline-block;background:#fef3c7;color:#92400e;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;margin-left:8px}
@media(max-width:720px){.kpi{grid-template-columns:repeat(2,1fr)}.fr2,.fr3{flex-direction:column}.cli-grid{grid-template-columns:1fr}}

</style>
</head>

  user: null,

function lsG(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function xe(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function uid(){return "C"+Date.now()+Math.floor(Math.random()*9999);}
function objToArr(o){return o?Object.values(o):[];}
function fbKey(s){return String(s).replace(/\./g,"__D__").replace(/#/g,"__H__").replace(/\$/g,"__S__").replace(/\[/g,"__LB__").replace(/\]/g,"__RB__").replace(/\//g,"__SL__");}

function cl(id){var w=document.getElementById(id);if(w)document.body.removeChild(w);}
function showNtf(msg,isErr){
  var el=document.getElementById("ntf");if(!el)return;
  el.className=isErr?"ntf-e":"ntf";el.textContent=msg;
  el.classList.remove("dn");setTimeout(function(){el.classList.add("dn");},5000);
}

// Firebase
function db(){return firebase.database();}
function fbSaveCliente(c){return db().ref("clienti/"+fbKey(c.id)).set(c);}
function fbDeleteCliente(id){return db().ref("clienti/"+fbKey(id)).remove();}

var FIREBASE_CONFIG_ANA_EMBEDDED = {
  apiKey: "AIzaSyDqPPI66dmbc2fR_vRBMVA3WhSJ3yrVz3A",
  authDomain: "studio-sarto-sieni-anagrafica.firebaseapp.com",

  messagingSenderId: "300950052397",
  appId: "1:300950052397:web:dfa51e4ae976c9eecfa2a4"
};

function avviaApp(){
  FIREBASE_CONFIG_ANA = FIREBASE_CONFIG_ANA_EMBEDDED;
  lsS("ss_ana_fbcfg", FIREBASE_CONFIG_ANA);
  ST.user = lsG("ss_ana_user", null);
  mostraSpinner();
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG_ANA);
    else firebase.app();
    db().ref("clienti").once("value").then(function(snap){
      ST.clienti = objToArr(snap.val());
      ST.loaded = true;
      render();
    }).catch(function(e){
      mostraErrore("Errore connessione Firebase: "+e.message);
    });
  }catch(e){mostraErrore("Errore Firebase: "+e.message);}
}

function mostraSpinner(){
  document.getElementById("root").innerHTML = '<div class="pg-center"><div style="text-align:center"><div class="spinner"></div><p style="color:#fff;font-size:14px;font-weight:600">Connessione database anagrafica...</p></div></div>';
}
function mostraErrore(msg){
  document.getElementById("root").innerHTML = '<div class="pg-center"><div class="lcard"><div class="lcard-body"><div class="lerr">'+xe(msg)+'</div><button class="btn-blu btn-full" id="err-reset" style="margin-top:10px">Riconfigura Firebase</button></div></div></div>';
  document.getElementById("err-reset").onclick = function(){lsS("ss_ana_fbcfg",null);FIREBASE_CONFIG_ANA=null;render();};
}

// ---- RENDER ----
function render(){
  var root=document.getElementById("root");if(!root)return;
  if(!FIREBASE_CONFIG_ANA){root.innerHTML=buildSetup();bindSetup();return;}
  if(!ST.user){root.innerHTML=buildLogin();bindLogin();return;}
  if(ST.vista==="scheda"&&ST.clienteSelId){root.innerHTML=buildScheda();bindScheda();}
  else{ST.vista="lista";root.innerHTML=buildLista();bindLista();}
}

// ---- SETUP FIREBASE ----
function buildSetup(){
  var h='<div class="pg-center"><div class="lcard" style="max-width:520px">';
  h+='<div class="lcard-top">'+FB_IMG_LOGIN;
  h+='<div class="lcard-title">Database Anagrafica</div>';
  h+='<div class="lcard-sub">Studio Sarto Sieni &ndash; Configurazione iniziale</div></div>';
  h+='<div class="lcard-body">';
  h+='<p style="font-size:12px;color:#64748b;margin-bottom:16px;line-height:1.6">Creare un <strong>secondo progetto Firebase</strong> dedicato esclusivamente all&#39;anagrafica clienti, poi incollare qui la configurazione.</p>';
  h+='<div class="fr"><label class="lbl">Configurazione Firebase (incollare qui)</label>';
  h+='<textarea class="inp" id="fb-cfg-input" style="height:120px;font-family:monospace;font-size:11px" placeholder="Incollare il contenuto di firebaseConfig..."></textarea></div>';
  h+='<div id="setup-err" class="lerr dn" style="margin-bottom:10px"></div>';
  h+='<button class="btn-blu btn-full" id="fb-connect">Connetti e avvia</button>';
  h+='</div>';
  h+='<div class="lfoot">I dati sono salvati esclusivamente nel Suo database Firebase.</div>';
  h+='</div></div>';
  return h;
}
function bindSetup(){
  document.getElementById("fb-connect").onclick=function(){
    var raw=document.getElementById("fb-cfg-input").value.trim();
    var err=document.getElementById("setup-err");
    if(!raw){err.textContent="Incollare la configurazione Firebase.";err.classList.remove("dn");return;}
    try{
      var cfg=JSON.parse(raw);
      if(!cfg.apiKey||!cfg.databaseURL){err.textContent="Configurazione non valida: mancano apiKey o databaseURL.";err.classList.remove("dn");return;}
      lsS("ss_ana_fbcfg",cfg);FIREBASE_CONFIG_ANA=cfg;
      avviaApp();
    }catch(e){err.textContent="Formato non valido. Controllare che sia un JSON corretto.";err.classList.remove("dn");}
  };
}

var ADMIN_PW = "admin2024!";
function buildLogin(){
  var h='<div class="pg-center"><div class="lcard">';
  h+='<div class="lcard-top">'+FB_IMG_LOGIN;

function bindLogin(){
  function doL(){
    var pw=document.getElementById("lpw").value;

    ST.user={name:"Amministratore"};lsS("ss_ana_user",ST.user);render();
  }
  document.getElementById("lbtn").onclick=doL;
  document.getElementById("lpw").onkeydown=function(e){if(e.key==="Enter")doL();};
  document.getElementById("leye").onclick=function(){var p=document.getElementById("lpw");p.type=(p.type==="password")?"text":"password";};
}

// ---- LISTA CLIENTI ----
function buildLista(){
  var filtrati = ST.clienti.filter(function(c){
    var txt = (c.cognomeNome||c.ragioneSociale||"").toLowerCase();
    var cf  = (c.codiceFiscale||"").toLowerCase();
    var piva= (c.partitaIva||"").toLowerCase();
    var q   = ST.ricerca.toLowerCase();
    var matchQ = !q || txt.includes(q) || cf.includes(q) || piva.includes(q);
    var matchT = !ST.filtroTipo || c.tipologia===ST.filtroTipo;
    return matchQ && matchT;
  }).slice().sort(function(a,b){
    var na=(a.cognomeNome||a.ragioneSociale||"").toLowerCase();
    var nb=(b.cognomeNome||b.ragioneSociale||"").toLowerCase();
    return na.localeCompare(nb);
  });

  var pf=ST.clienti.filter(function(c){return c.tipologia==="Persona fisica";}).length;
  var soc=ST.clienti.filter(function(c){return c.tipologia!=="Persona fisica"&&c.tipologia!=="";}).length;

  var h=buildHdr();
  h+='<div id="ntf" class="ntf dn"></div><div class="ct">';
  h+='<h2 class="pg-title">Anagrafica Clienti</h2>';
  h+='<p class="pg-sub">Archivio completo dei clienti dello Studio. Cliccare su un cliente per visualizzare e modificare la scheda anagrafica.</p>';

  // KPI
  h+='<div class="kpi">';
  h+='<div class="kc" style="border-top:3px solid #1e3a6e"><div class="kn" style="color:#1e3a6e">'+ST.clienti.length+'</div><div class="kl">Clienti totali</div></div>';
  h+='<div class="kc" style="border-top:3px solid #059669"><div class="kn" style="color:#059669">'+pf+'</div><div class="kl">Persone fisiche</div></div>';
  h+='<div class="kc" style="border-top:3px solid #7c3aed"><div class="kn" style="color:#7c3aed">'+soc+'</div><div class="kl">Societa e ditte</div></div>';
  h+='</div>';

  // Barra azioni
  var opT='<option value="">Tutte le tipologie</option>';
  TIPOLOGIE_ARR.forEach(function(t){opT+='<option value="'+xe(t)+'"'+(ST.filtroTipo===t?' selected':'')+'>'+xe(t)+'</option>';});
  h+='<div class="abar"><div class="search-wrap">';
  h+='<input class="search-inp" id="s-cerca" placeholder="&#128269; Cerca per nome, CF, P.IVA..." value="'+xe(ST.ricerca)+'">';
  h+='<select class="fi" id="s-tipo">'+opT+'</select>';

  h+='</div><button class="btn-blu" id="btn-new">+ Nuovo cliente</button></div>';

  // Griglia clienti
  h+='<div class="cli-grid">';

    h+='<div class="empty" style="grid-column:1/-1">&#128101; Nessun cliente trovato.<br><small style="margin-top:8px;display:block">Clicca + Nuovo cliente per iniziare.</small></div>';
  }else{
    filtrati.forEach(function(c){
      var nome=c.cognomeNome||c.ragioneSociale||"&mdash;";
      h+='<div class="cli-card">';
      h+='<div class="cli-card-top"><div>';
      h+='<div class="cli-nome">'+xe(nome)+'</div>';
      h+='<span class="cli-tipo">'+xe(c.tipologia||"&mdash;")+'</span>';
      h+='</div></div>';
      h+='<div class="cli-info">';
      if(c.codiceFiscale) h+='<div>&#128194; CF: <strong>'+xe(c.codiceFiscale)+'</strong></div>';
      if(c.partitaIva)    h+='<div>&#128194; P.IVA: <strong>'+xe(c.partitaIva)+'</strong></div>';
      if(c.citta)         h+='<div>&#128205; '+xe(c.citta)+(c.provincia?' ('+xe(c.provincia)+')':'')+'</div>';
      if(c.telefono)      h+='<div>&#128222; '+xe(c.telefono)+'</div>';
      if(c.email)         h+='<div>&#9993; '+xe(c.email)+'</div>';
      h+='</div>';
      h+='<div class="cli-actions">';
      h+='<button class="btn-sm-e" data-apri="'+xe(c.id)+'">&#128065; Visualizza scheda</button>';
      h+='<button class="btn-sm-d" data-del="'+xe(c.id)+'">&#128465; Elimina</button>';
      h+='</div></div>';
    });
  }
  h+='</div>';
  h+='<div class="foot">Studio Sarto Sieni &ndash; Firenze &nbsp;|&nbsp; Anagrafica Clienti &nbsp;|&nbsp; Database Firebase</div></div>';
  return h;
}

function bindLista(){
  document.getElementById("h-out").onclick=function(){ST.user=null;lsS("ss_ana_user",null);render();};
  document.getElementById("btn-new").onclick=function(){openModalNuovo();};
  var sc=document.getElementById("s-cerca");if(sc)sc.oninput=function(){ST.ricerca=this.value;render();};
  var st=document.getElementById("s-tipo");if(st)st.onchange=function(){ST.filtroTipo=this.value;render();};
  var sr=document.getElementById("s-reset");if(sr)sr.onclick=function(){ST.ricerca="";ST.filtroTipo="";render();};
  document.querySelectorAll("[data-apri]").forEach(function(b){
    b.onclick=function(){ST.clienteSelId=b.dataset.apri;ST.vista="scheda";ST.editMode=false;render();};
  });
  document.querySelectorAll("[data-del]").forEach(function(b){
    b.onclick=function(){
      var c=ST.clienti.find(function(x){return x.id===b.dataset.del;});
      var nome=c?c.cognomeNome||c.ragioneSociale||"questo cliente":"questo cliente";
      if(!confirm("Eliminare definitivamente "+nome+"?"))return;
      ST.clienti=ST.clienti.filter(function(x){return x.id!==b.dataset.del;});
      fbDeleteCliente(b.dataset.del);render();showNtf("Cliente eliminato.");
    };
  });
}

// ---- SCHEDA ANAGRAFICA ----
function buildScheda(){

  if(!c){ST.vista="lista";return buildLista();}
  var edit=ST.editMode;
  var nome=c.cognomeNome||c.ragioneSociale||"Cliente";

  var h=buildHdr();
  h+='<div id="ntf" class="ntf dn"></div><div class="ct">';

  // Header scheda
  h+='<div class="scheda">';
  h+='<div class="scheda-hdr">';
  h+='<div><div class="scheda-nome">'+xe(nome);
  if(edit) h+='<span class="badge-mod">&#9998; Modifica in corso</span>';
  h+='</div><span class="cli-tipo" style="margin-top:4px;display:inline-block">'+xe(c.tipologia||"&mdash;")+'</span></div>';

    h+='<button class="btn-blu" id="sch-edit">&#9998; Modifica dati</button>';
    h+='<button class="btn-sm-d" id="sch-del" style="padding:8px 14px">&#128465; Elimina</button>';
  }else{
    h+='<button class="btn-grn" id="sch-save">&#10003; Salva modifiche</button>';
    h+='<button class="btn-sec" id="sch-ann">Annulla</button>';
  }

  h+='<div class="field-group-title">Dati identificativi</div>';
  h+='<div class="fr2">';
  h+='<div><label class="lbl">Tipologia soggetto</label>';
  if(edit) h+='<select class="inp" id="f-tipologia"><TIPOLOGIE_OPT_CURRENT></select>';
  else h+='<input class="inp" readonly value="'+xe(c.tipologia||"")+'"></div>';
  h+='<div></div></div>';
  h+='<div class="fr2">';
  h+='<div><label class="lbl">Cognome e Nome / Ragione sociale</label>';

  h+='</div>';
  h+='<div></div></div>';
  h+='<div class="fr2">';
  h+='<div><label class="lbl">Codice fiscale</label>';
  h+=(edit?'<input class="inp" id="f-codiceFiscale" value="'+xe(c.codiceFiscale||"")+'">':'<input class="inp" readonly value="'+xe(c.codiceFiscale||"")+'">');
  h+='</div>';
  h+='<div><label class="lbl">Partita IVA</label>';
  h+=(edit?'<input class="inp" id="f-partitaIva" value="'+xe(c.partitaIva||"")+'">':'<input class="inp" readonly value="'+xe(c.partitaIva||"")+'">');
  h+='</div></div>';
  h+='</div>';

  // Indirizzo
  h+='<div class="field-group">';
  h+='<div class="field-group-title">Indirizzo</div>';
  h+='<div class="fr"><label class="lbl">Indirizzo (via, numero civico)</label>';
  h+=(edit?'<input class="inp" id="f-indirizzo" value="'+xe(c.indirizzo||"")+'">':'<input class="inp" readonly value="'+xe(c.indirizzo||"")+'">');
  h+='</div>';
  h+='<div class="fr3">';
  h+='<div style="flex:0 0 90px"><label class="lbl">CAP</label>';
  h+=(edit?'<input class="inp" id="f-cap" value="'+xe(c.cap||"")+'">':'<input class="inp" readonly value="'+xe(c.cap||"")+'">');
  h+='</div>';
  h+='<div style="flex:1"><label class="lbl">Citta</label>';
  h+=(edit?'<input class="inp" id="f-citta" value="'+xe(c.citta||"")+'">':'<input class="inp" readonly value="'+xe(c.citta||"")+'">');
  h+='</div>';
  h+='<div style="flex:0 0 80px"><label class="lbl">Provincia</label>';
  if(edit) h+='<select class="inp" id="f-provincia"><PROVINCE_OPT_CURRENT></select>';
  else h+='<input class="inp" readonly value="'+xe(c.provincia||"")+'">';
  h+='</div></div>';
  h+='</div>';

  // Contatti
  h+='<div class="field-group">';
  h+='<div class="field-group-title">Contatti</div>';

  h+=(edit?'<input class="inp" id="f-telefono" type="tel" value="'+xe(c.telefono||"")+'">':'<input class="inp" readonly value="'+xe(c.telefono||"")+'">');

  h+='</div></div>';
  h+='<div class="fr2">';
  h+='<div><label class="lbl">Email</label>';
  h+=(edit?'<input class="inp" id="f-email" type="email" value="'+xe(c.email||"")+'">':'<input class="inp" readonly value="'+xe(c.email||"")+'">');

  h+='<div><label class="lbl">PEC</label>';

  }

  h+='<div class="foot">Studio Sarto Sieni &ndash; Firenze &nbsp;|&nbsp; Anagrafica Clienti</div></div>';

  // Inject select options with current values
  var tipOpt="";

  h=h.replace('<TIPOLOGIE_OPT_CURRENT>',tipOpt);

  var provOpt='<option value="">--</option>';
  PROVINCE_ARR.forEach(function(p){provOpt+='<option value="'+p+'"'+(c.provincia===p?' selected':'')+'>'+p+'</option>';});

  return h;
}

function bindScheda(){
  document.getElementById("h-out").onclick=function(){ST.user=null;lsS("ss_ana_user",null);render();};
  var hb=document.getElementById("h-back");if(hb)hb.onclick=function(){ST.vista="lista";ST.editMode=false;render();};

  function attivaEdit(){ST.editMode=true;render();}
  function annullaEdit(){ST.editMode=false;render();}

  var e1=document.getElementById("sch-edit");if(e1)e1.onclick=attivaEdit;
  var e2=document.getElementById("sch-edit2");if(e2)e2.onclick=attivaEdit;
  var ann=document.getElementById("sch-ann");if(ann)ann.onclick=annullaEdit;

  var del=document.getElementById("sch-del");
  if(del)del.onclick=function(){
    var c=ST.clienti.find(function(x){return x.id===ST.clienteSelId;});
    var nome=c?c.cognomeNome||c.ragioneSociale||"questo cliente":"questo cliente";
    if(!confirm("Eliminare definitivamente "+nome+"?"))return;
    ST.clienti=ST.clienti.filter(function(x){return x.id!==ST.clienteSelId;});
    fbDeleteCliente(ST.clienteSelId);
    ST.vista="lista";ST.clienteSelId=null;ST.editMode=false;
    render();showNtf("Cliente eliminato.");
  };

  var sav=document.getElementById("sch-save");
  if(sav)sav.onclick=function(){
    var c=ST.clienti.find(function(x){return x.id===ST.clienteSelId;});if(!c)return;
    var nome=document.getElementById("f-cognomeNome").value.trim();
    if(!nome){alert("Il campo Nome / Ragione sociale non puo essere vuoto.");return;}
    var upd={
      id:c.id,
      tipologia:document.getElementById("f-tipologia").value,
      cognomeNome:nome,
      ragioneSociale:nome,
      codiceFiscale:document.getElementById("f-codiceFiscale").value.trim().toUpperCase(),
      partitaIva:document.getElementById("f-partitaIva").value.trim(),
      indirizzo:document.getElementById("f-indirizzo").value.trim(),
      cap:document.getElementById("f-cap").value.trim(),
      citta:document.getElementById("f-citta").value.trim(),
      provincia:document.getElementById("f-provincia").value,
      telefono:document.getElementById("f-telefono").value.trim(),
      cellulare:document.getElementById("f-cellulare").value.trim(),
      email:document.getElementById("f-email").value.trim(),
      pec:document.getElementById("f-pec").value.trim(),
      note:document.getElementById("f-note").value.trim(),
      dataAggiornamento:new Date().toLocaleString("it-IT")
    };
    ST.clienti=ST.clienti.map(function(x){return x.id===upd.id?upd:x;});
    ST.editMode=false;
    render();
    showNtf("Dati salvati correttamente.");
    fbSaveCliente(upd);
  };
}

  h+='<div class="mhdr"><span class="mhdr-t">Nuovo cliente</span><button class="mcls" id="new-x">&#10005;</button></div>';
  h+='<div class="mbdy">';

  h+='<div class="field-group">';
  h+='<div class="field-group-title">Dati identificativi</div>';
  h+='<div class="fr"><label class="lbl">Tipologia soggetto *</label><select class="inp" id="n-tipologia">'+tipOpt+'</select></div>';
  h+='<div class="fr"><label class="lbl">Cognome e Nome / Ragione sociale *</label><input class="inp" id="n-cognomeNome" placeholder="es. Rossi Mario oppure Rossi Srl"></div>';
  h+='<div class="fr2">';
  h+='<div><label class="lbl">Codice fiscale</label><input class="inp" id="n-codiceFiscale" placeholder="RSSMRA80A01H501Z" style="text-transform:uppercase"></div>';
  h+='<div><label class="lbl">Partita IVA</label><input class="inp" id="n-partitaIva" placeholder="01234567890"></div>';
  h+='</div></div>';

  h+='<div class="field-group">';
  h+='<div class="field-group-title">Indirizzo</div>';
  h+='<div class="fr"><label class="lbl">Indirizzo</label><input class="inp" id="n-indirizzo" placeholder="Via Roma 1"></div>';
  h+='<div class="fr3">';
  h+='<div style="flex:0 0 90px"><label class="lbl">CAP</label><input class="inp" id="n-cap" placeholder="50100"></div>';
  h+='<div style="flex:1"><label class="lbl">Citta</label><input class="inp" id="n-citta" placeholder="Firenze"></div>';
  h+='<div style="flex:0 0 80px"><label class="lbl">Prov.</label><select class="inp" id="n-provincia">'+provOpt+'</select></div>';
  h+='</div></div>';

  h+='<div class="field-group">';
  h+='<div class="field-group-title">Contatti</div>';
  h+='<div class="fr2">';
  h+='<div><label class="lbl">Telefono</label><input class="inp" id="n-telefono" type="tel" placeholder="055 123456"></div>';
  h+='<div><label class="lbl">Cellulare</label><input class="inp" id="n-cellulare" type="tel" placeholder="348 1234567"></div>';
  h+='</div>';
  h+='<div class="fr2">';
  h+='<div><label class="lbl">Email</label><input class="inp" id="n-email" type="email" placeholder="mario@esempio.it"></div>';
  h+='<div><label class="lbl">PEC</label><input class="inp" id="n-pec" type="email" placeholder="mario@pec.it"></div>';
  h+='</div></div>';

  h+='<div class="field-group">';
  h+='<div class="field-group-title">Note</div>';
  h+='<textarea class="inp" id="n-note" placeholder="Note interne..."></textarea>';
  h+='</div>';

  h+='</div>';
  h+='<div class="mft"><button class="btn-sec" id="new-ann">Annulla</button><button class="btn-blu" id="new-sv">Salva cliente</button></div>';
  h+='</div></div>';
  d.innerHTML=h;document.body.appendChild(d);

  function chiudi(){cl("w-new");}
  document.getElementById("new-x").onclick=chiudi;
  document.getElementById("new-ann").onclick=chiudi;

  // uppercase CF
  var cf=document.getElementById("n-codiceFiscale");
  if(cf)cf.oninput=function(){this.value=this.value.toUpperCase();};

  document.getElementById("new-sv").onclick=function(){
    var nome=document.getElementById("n-cognomeNome").value.trim();
    if(!nome){alert("Il campo Nome / Ragione sociale e obbligatorio.");return;}
    var newC={
      id:uid(),
      tipologia:document.getElementById("n-tipologia").value,
      cognomeNome:nome,
      ragioneSociale:nome,
      codiceFiscale:document.getElementById("n-codiceFiscale").value.trim().toUpperCase(),
      partitaIva:document.getElementById("n-partitaIva").value.trim(),
      indirizzo:document.getElementById("n-indirizzo").value.trim(),
      cap:document.getElementById("n-cap").value.trim(),
      citta:document.getElementById("n-citta").value.trim(),

    };

    ST.clienteSelId=newC.id;ST.vista="scheda";ST.editMode=false;

  };
}
