<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Studio Sarto Sieni - Portale Scadenze</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f1f5f9;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:13px}
button{cursor:pointer}
.dn{display:none!important}
.hdr{background:#1e3a6e;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25);flex-wrap:wrap;gap:8px}
.hdr-logo{height:48px;object-fit:contain;background:#fff;border-radius:4px;padding:2px 6px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-info{color:#cbd5e1;font-size:12px}
.btn-hdr{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:5px 12px;font-size:12px}
.btn-hdr:hover{background:rgba(255,255,255,.22)}
.btn-gold{background:#c9a227;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700}
.btn-grn{background:#16a34a;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700}
.pg-center{min-height:100vh;background:linear-gradient(145deg,#0f2550,#1e3a6e 50%,#1e40af);display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:#fff;border-radius:18px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.lcard-top{background:#1e3a6e;padding:28px 32px 24px;text-align:center}
.lcard-title{color:#fff;font-size:17px;font-weight:700;margin-top:14px}
.lcard-sub{color:#93c5fd;font-size:12px;margin-top:4px}
.lcard-body{padding:28px 32px}
.lfoot{background:#f8fafc;padding:14px 32px;text-align:center;color:#94a3b8;font-size:11px;border-top:1px solid #e2e8f0}
.lerr{color:#dc2626;font-size:12px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:8px 12px;margin-bottom:14px;text-align:center}
.fr{margin-bottom:14px}
.fr2{display:flex;gap:12px;margin-bottom:14px}
.fr2>div{flex:1;min-width:0}
.lbl{display:block;font-size:10px;font-weight:700;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:9px 11px;border:1.5px solid #e2e8f0;border-radius:8px;color:#1e293b;background:#fff}
.inp:focus{border-color:#1e3a6e;outline:none}
textarea.inp{resize:vertical}
.pw-wrap{position:relative}
.pw-wrap .inp{padding-right:38px}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:15px;color:#94a3b8}
.btn-blu{background:#1e3a6e;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700}
.btn-blu:hover{background:#2d5091}
.btn-sec{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 18px}
.btn-aut{width:100%;background:#1e3a6e;color:#fff;border:none;border-radius:8px;padding:10px;font-weight:700;margin-top:4px}
.btn-full{width:100%;padding:12px;font-size:14px}
.btn-sm-e{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:5px;padding:3px 7px;font-size:11px;margin-right:3px}
.btn-sm-d{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:5px;padding:3px 7px;font-size:11px;margin-right:3px}
.btn-sm-m{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:5px;padding:3px 7px;font-size:11px}
.ct{max-width:1300px;margin:0 auto;padding:20px 16px}
.pg-title{color:#1e3a6e;font-size:19px;font-weight:800;margin-bottom:4px}
.pg-sub{color:#64748b;font-size:12px;margin-bottom:20px}
.sec-title{color:#1e3a6e;font-size:12px;font-weight:800;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e2e8f0;text-transform:uppercase;letter-spacing:.5px}
.kpi{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kc{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.kn{font-size:26px;font-weight:900;line-height:1}
.kl{font-size:11px;color:#64748b;margin-top:4px}
.abar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.flt{display:flex;gap:8px;flex-wrap:wrap}
.fi{padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;background:#fff;color:#1e293b;font-size:12px}
.tw{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow-x:auto;margin-bottom:20px}
table{width:100%;border-collapse:collapse;min-width:860px}
thead tr{background:#1e3a6e}
th{color:#fff;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;white-space:nowrap}
td{padding:9px 12px;font-size:12px;color:#1e293b;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:hover td{background:#f8fafc}
.b{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.b-sc{background:#fee2e2;color:#b91c1c}
.b-og{background:#7c3aed;color:#fff}
.b-ur{background:#fef3c7;color:#92400e}
.b-ok{background:#dbeafe;color:#1e40af}
.b-f2{background:#dbeafe;color:#1e40af}
.b-bl{background:#dcfce7;color:#15803d}
.b-cb{background:#fef3c7;color:#92400e}
.b-admin{background:#1e3a6e;color:#fff}
.b-utente{background:#dbeafe;color:#1e40af}
.b-ospite{background:#f1f5f9;color:#64748b}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left:4px solid #1e3a6e}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-tipo{font-size:10px;font-weight:800;color:#64748b;text-transform:uppercase}
.card-imp{font-size:28px;font-weight:900;color:#1e3a6e;margin:8px 0 12px}
.card-row{font-size:13px;color:#334155;margin-bottom:4px}
.card-note{font-size:11px;color:#64748b;background:#f8fafc;border-radius:6px;padding:6px 9px;margin:10px 0}
.box-a{background:#dcfce7;color:#15803d;border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;margin-top:8px}
.box-sc{background:#fee2e2;color:#b91c1c;border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;margin-top:8px}
.box-i{background:#fff7ed;color:#92400e;border-radius:8px;padding:9px 12px;font-size:12px;border-left:3px solid #f59e0b;margin-top:8px}
.track{font-size:10px;color:#94a3b8;margin-top:6px;font-style:italic}
.ov{position:fixed;inset:0;background:rgba(15,37,80,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.modal-lg{max-width:720px}
.modal-sm{max-width:480px}
.mhdr{background:#1e3a6e;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;border-radius:16px 16px 0 0}
.mhdr-t{color:#fff;font-weight:700;font-size:15px}
.mcls{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;width:28px;height:28px;font-size:14px}
.mbdy{padding:24px}
.mft{padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.ntf{background:#dcfce7;color:#15803d;text-align:center;padding:10px;font-size:13px;font-weight:700;border-bottom:2px solid #bbf7d0}
.ntf-e{background:#fee2e2;color:#b91c1c;text-align:center;padding:10px;font-size:13px;font-weight:700;border-bottom:2px solid #fecaca}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 14px;font-size:12px;color:#1e40af;line-height:1.7;margin-bottom:14px}
.warn-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px 14px;font-size:12px;color:#92400e;line-height:1.7;margin-bottom:14px}
.ok-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 14px;font-size:12px;color:#15803d;line-height:1.7;margin-bottom:12px}
.ntf-row{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 16px;margin-bottom:8px}
.ntf-row-info{flex:1}
.ntf-row-nome{font-weight:700;font-size:13px;color:#1e293b}
.ntf-row-det{font-size:11px;color:#64748b;margin-top:2px;margin-bottom:4px}
.ntf-row-btns{display:flex;gap:4px;flex-wrap:wrap}
.spinner{border:3px solid #e2e8f0;border-top:3px solid #1e3a6e;border-radius:50%;width:36px;height:36px;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{margin-top:30px;text-align:center;color:#94a3b8;font-size:11px;border-top:1px solid #e2e8f0;padding-top:16px}
.empty{text-align:center;color:#94a3b8;padding:50px;background:#fff;border-radius:12px;font-size:14px}
.role-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.ospite-banner{background:#fff7ed;border:2px solid #f59e0b;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:#92400e;font-weight:600}
@media(max-width:720px){.kpi{grid-template-columns:repeat(2,1fr)}.fr2{flex-direction:column}}

</style>
</head>

function fbKey(s){return String(s).replace(/\./g,"__D__").replace(/#/g,"__H__").replace(/\$/g,"__S__").replace(/\[/g,"__LB__").replace(/\]/g,"__RB__").replace(/\//g,"__SL__");}
function objToArr(o){return o?Object.values(o):[];}
function nowStr(){return new Date().toLocaleString("it-IT");}
function getAllClienti(){
  // ESCLUSIVAMENTE da Firebase Anagrafica - nessun duplicato
  var tutti=ST_anaClienti.map(function(c){
    return {
      cid:c.id,
      name:c.cognomeNome||c.ragioneSociale||"",
      email:c.email||"",
      cf:c.codiceFiscale||"",
      piva:c.partitaIva||"",
      tipologia:c.tipologia||""
    };
  });
  return tutti.sort(function(a,b){return a.name.localeCompare(b.name);});
}




function eseguiRipristino(){
  if(!confirm("ATTENZIONE: il ripristino sovrascrive TUTTI i dati attuali (scadenze e utenti portale) con quelli del file di backup.\n\nContinuare?"))return;
  var input=document.createElement("input");
  input.type="file";
  input.accept=".json,application/json";
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        // Verifica struttura minima
        if(!data.scadenze&&!data.utentiPortale){
          alert("File non valido: non sembra un backup di Studio Sarto Sieni.");return;
        }
        var nSc=(data.scadenze||[]).length;
        var nCli=(data.utentiPortale||[]).length;
        var info="Backup del: "+(data.dataBackup||"data sconosciuta")+"\n";
        info+="Scadenze: "+nSc+"\n";
        info+="Clienti portale: "+nCli+"\n\n";
        info+="Confermare il ripristino?";
        if(!confirm(info))return;
        // Ripristina scadenze
        if(data.scadenze&&data.scadenze.length){
          var bsSc={};
          data.scadenze.forEach(function(s){bsSc[s.id]=s;});
          db().ref("scadenze").set(bsSc).then(function(){
            ST.sc=data.scadenze;
          });
        }
        // Ripristina utenti portale
        if(data.utentiPortale&&data.utentiPortale.length){
          var bsUt={};
          data.utentiPortale.forEach(function(u){bsUt[fbKey(u.id)]=u;});
          db().ref("utenti").set(bsUt).then(function(){
            ST.ut=data.utentiPortale;
          });
        }
        // Ripristina config se presente
        if(data.config){
          ST.cfg=data.config;
          db().ref("config").set(data.config);
        }
        setTimeout(function(){
          render();
          showNtf("Ripristino completato: "+nSc+" scadenze e "+nCli+" clienti portale.");
        },800);
      }catch(err){
        alert("Errore nella lettura del file: "+err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
function eseguiBackup(){
  var data={

    scadenze: ST.sc,
    utentiPortale: ST.ut.filter(function(u){return u.role==="client";}),

  a.download="backup_scadenze_"+new Date().toISOString().slice(0,10)+".json";

  showNtf("Backup scaricato: "+a.download);
}
function fmtRata(s){
  if(!s||(!s.rataNum&&!s.rataTot)) return "";
  if(s.rataNum&&s.rataTot) return "Rata "+s.rataNum+" di "+s.rataTot;
  if(s.rataNum) return "Rata n. "+s.rataNum;
  if(s.rataTot) return s.rataTot+" rate totali";
  return "";
}

function bdg(s){
  var d=dif(s.data);
  if(d<0)  return '<span class="b b-sc">SCADUTA</span>';
  if(d===0) return '<span class="b b-og">OGGI</span>';
  if(d<=7)  return '<span class="b b-ur">Urgente ('+d+'gg)</span>';
  return '<span class="b b-ok">'+d+' giorni</span>';
}
function mbdg(m){
  if(m==="Modello F24") return '<span class="b b-f2">F24</span>';
  if(m==="Bollettino")  return '<span class="b b-bl">Bollettino</span>';
  return '<span class="b b-cb">CBILL</span>';
}
function roleBdg(r){
  if(r==="admin")   return '<span class="role-badge b-admin">ADMIN</span>';
  if(r==="utente")  return '<span class="role-badge b-utente">UTENTE</span>';
  return '<span class="role-badge b-ospite">OSPITE</span>';
}

// Listener real-time per scadenze (aggiornamento automatico per tutti)
function startRealtimeListener(){
  db().ref("scadenze").on("value",function(snap){
    var nuoviDati=objToArr(snap.val());
    // Aggiorna ST.sc mantenendo i pianoId sempre
    // Merge: i dati Firebase vincono, ma preserva pianoId locale se FB non ce l'ha ancora
    ST.sc=nuoviDati.map(function(s){
      // Se la rata ha gia pianoId dal DB, usalo
      if(s.pianoId) return s;
      // Altrimenti cerca in ST.sc locale
      var loc=ST.sc.find(function(x){return x.id===s.id;});
      return loc&&loc.pianoId?Object.assign({},s,{pianoId:loc.pianoId,numAtto:loc.numAtto}):s;
    });
    if(ST.loaded && ST.user && ST.user.role==="client" && !document.querySelector(".ov")){
      var root=document.getElementById("root");
      if(root){root.innerHTML=buildCliente();bindCliente();}
    }
    if(ST.loaded && ST.user && ST.user.role==="ospite" && !document.querySelector(".ov")){
      var root=document.getElementById("root");
      if(root){root.innerHTML=buildAdmin();bindAdmin();}
    }
  });
}

// ============================================================
// MIGRAZIONE: estrae codice atto dal campo note
// e popola pianoId/numAtto per scadenze esistenti
// ============================================================
function migraAttoNote(){
  var toUpdate=[];
  ST.sc.forEach(function(s){
    // Salta se ha gia pianoId o numAtto
    if(s.pianoId||s.numAtto) return;
    // Cerca pattern "Atto: XXXXX" nel campo note
    if(!s.note) return;
    var match=s.note.match(/Atto:\s*([^\s|,;]+)/i);
    if(!match) return;
    var atto=match[1].trim();
    if(!atto) return;
    toUpdate.push({s:s, atto:atto});
  });
  if(!toUpdate.length) return;
  console.log("[Migrazione] "+toUpdate.length+" scadenze con atto da migrare");
  toUpdate.forEach(function(item){
    var updated=Object.assign({},item.s,{
      pianoId:item.atto,
      numAtto:item.atto,
      rifAtt:item.atto
    });
    ST.sc=ST.sc.map(function(x){return x.id===updated.id?updated:x;});
    fbSaveScadenza(updated);
  });
  console.log("[Migrazione] Completata: "+toUpdate.length+" scadenze aggiornate");
}
function avviaApp(){
  var root=document.getElementById("root");
  root.innerHTML='<div class="pg-center"><div style="text-align:center"><div class="spinner"></div><p style="color:#fff;font-size:14px;font-weight:600">Connessione...</p></div></div>';
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    // Secondo Firebase: anagrafica clienti (sola lettura)
    try{
      firebase.initializeApp(FB_ANA_CFG, "anagrafica");
      firebase.app("anagrafica").database().ref("clienti").on("value", function(snap){
        ST_anaClienti = snap.val() ? Object.values(snap.val()) : [];
        ST_anaLoaded = true;
      });
    }catch(e2){console.warn("Anagrafica Firebase:", e2);}
    db().ref("/").once("value").then(function(snap){
      var data=snap.val()||{};
      ST.ut=objToArr(data.utenti);
      ST.sc=objToArr(data.scadenze);
      ST.cfg=data.config||CFG_DEF;
      ST.utStudio=objToArr(data.utentiStudio);
      ST.user=lsG("ss_user",null);
      // Init dati demo se vuoti
      if(!ST.ut.length){
        ST.ut=UD_DEF.slice();
        var bu={};UD_DEF.forEach(function(u){bu[fbKey(u.id)]=u;});
        db().ref("utenti").set(bu);
      }
      if(!ST.sc.length){
        ST.sc=SD_DEF.slice();
        var bs={};SD_DEF.forEach(function(s){bs[s.id]=s;});
        db().ref("scadenze").set(bs);
      }
      // Init utenti studio se vuoti
      if(!ST.utStudio.length){
        ST.utStudio=UTENTI_STUDIO_DEF.slice();
        var bst={};UTENTI_STUDIO_DEF.forEach(function(u){bst[fbKey(u.id)]=u;});
        db().ref("utentiStudio").set(bst);
      }
      ST.loaded=true;
      // Migrazione automatica: estrae codice atto dalle note
      migraAttoNote();
      startRealtimeListener();
      render();
    }).catch(function(e){
      root.innerHTML='<div class="pg-center"><div class="lcard"><div class="lcard-top">'+FB_IMG_LOGIN+'</div><div class="lcard-body"><div class="lerr">Errore di connessione: '+xe(e.message)+'</div><p style="font-size:12px;color:#64748b;margin-top:10px">Verificare la connessione internet e ricaricare la pagina.</p></div></div></div>';
    });
  }catch(e){
    root.innerHTML='<div class="pg-center"><div class="lcard"><div class="lcard-body"><div class="lerr">Errore: '+xe(e.message)+'</div></div></div></div>';
  }
}

function bindLogin(){
  function doL(){
    var id=document.getElementById("lu").value.trim();
    var pw=document.getElementById("lp").value;
    var e=document.getElementById("lerr");
    // Cerca prima tra utenti studio
    var uStudio=ST.utStudio.find(function(x){return x.id===id&&x.pw===pw;});
    if(uStudio){
      // Utente studio: role e admin/utente/ospite
      ST.user=uStudio;lsS("ss_user",uStudio);render();return;
    }
    // Cerca tra clienti portale
    var uClient=ST.ut.find(function(x){return x.id===id&&x.pw===pw;});
    if(uClient){
      ST.user=uClient;lsS("ss_user",uClient);render();return;
    }
    e.textContent="Credenziali non valide. Riprovare.";e.classList.remove("dn");
  }
  document.getElementById("lbtn").onclick=doL;
  document.getElementById("lp").onkeydown=function(e){if(e.key==="Enter")doL();};
  document.getElementById("lu").onkeydown=function(e){if(e.key==="Enter")doL();};
  document.getElementById("leye").onclick=function(){
    var p=document.getElementById("lp");p.type=(p.type==="password")?"text":"password";
  };
}

// ADMIN / UTENTE / OSPITE DASHBOARD
// ============================================================
function buildAdmin(){
  var sc=ST.sc;
  var cli=ST.ut.filter(function(u){return u.role==="client";});
  var urg=sc.filter(function(s){var d=dif(s.data);return d>=0&&d<=7;}).length;
  var scd=sc.filter(function(s){return dif(s.data)<0;}).length;
  var daA=sc.filter(function(s){return s.mod==="Modello F24"&&!s.aut&&dif(s.data)>=0;}).length;
  var mc=new Date().toISOString().slice(0,7);
  var tot=sc.filter(function(s){return s.data.startsWith(mc);}).reduce(function(a,b){return a+b.importo;},0);
  var ntfPend=sc.filter(function(s){var d=dif(s.data);return !s.aut&&!s.emlSent&&d>=0&&d<=s.pre;}).length;
  var fCli=ST.fCli||"",fTipo=ST.fTipo||"",fMese=ST.fMese||"";
  var fStato2=ST.fStato||"";
  var fAtto2=ST.fAtto||"";
  var fil=sc.filter(function(s){
    var d=dif(s.data);
    var matchStato=true;
    if(fStato2==="scadute") matchStato=d<0;
    else if(fStato2==="non_scadute") matchStato=d>=0;
    else if(fStato2==="urgenti") matchStato=d>=0&&d<=7;
    var matchAtto=!fAtto2||(s.rifAtt===fAtto2)||(s.pianoId===fAtto2)||(s.numAtto===fAtto2)||(s.rifAtt&&s.rifAtt.indexOf(fAtto2)>=0)||(s.pianoId&&s.pianoId.indexOf(fAtto2)>=0)||(s.numAtto&&s.numAtto.indexOf(fAtto2)>=0);
    return(!fCli||s.cid===fCli)&&(!fTipo||s.tipo===fTipo)&&(!fMese||s.data.startsWith(fMese))&&matchStato&&matchAtto;
  }).slice().sort(function(a,b){return a.data.localeCompare(b.data);});

  var h=buildHdr(true);
  h+='<div id="ntf" class="ntf dn"></div><div class="ct">';

  // Banner ospite
  if(ST.user.role==="ospite"){
    h+='<div class="ospite-banner">&#128274; Modalita visualizzazione &mdash; Non e consentita la modifica dei dati.</div>';
  }

  // Avviso notifiche
  if(ntfPend>0 && can("admin")){
    h+='<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#92400e">&#9888; <strong>'+ntfPend+' notifiche da inviare</strong> &mdash; clicca Notifiche nell&#39;intestazione.</div>';
  }

  // KPI
  // Dropdown clienti: costruito dai cid PRESENTI nelle scadenze
  // cosi filtro e dati sono sempre allineati
  var cidPresenti={};
  sc.forEach(function(s){if(s.cid) cidPresenti[s.cid]=s.cn||s.cid;});
  // Integra con i nomi dall'anagrafica se disponibili
  var anaMap={};
  ST_anaClienti.forEach(function(c){anaMap[c.id]=c.cognomeNome||c.ragioneSociale||c.id;});
  ST.ut.filter(function(u){return u.role==="client";}).forEach(function(u){if(u.cid) anaMap[u.cid]=u.name||u.cid;});
  var opC='<option value="">Tutti i clienti</option>';
  Object.keys(cidPresenti).sort(function(a,b){
    var na=anaMap[a]||cidPresenti[a];
    var nb=anaMap[b]||cidPresenti[b];
    return na.localeCompare(nb);
  }).forEach(function(cid){
    var nome=anaMap[cid]||cidPresenti[cid];
    opC+='<option value="'+xe(cid)+'"'+(fCli===cid?' selected':'')+'>'+xe(nome)+'</option>';
  });
  var opT='<option value="">Tutte le tipologie</option>';
  TIP.forEach(function(t){opT+='<option'+(fTipo===t?' selected':'')+'>'+xe(t)+'</option>';});

  h+='<div class="kpi">';
  h+='<div class="kc" style="border-top:3px solid #1e3a6e"><div class="kn" style="color:#1e3a6e">'+sc.length+'</div><div class="kl">Scadenze totali</div></div>';
  h+='<div class="kc" style="border-top:3px solid #d97706"><div class="kn" style="color:#d97706">'+urg+'</div><div class="kl">Urgenti (&le;7gg)</div></div>';
  h+='<div class="kc" style="border-top:3px solid #dc2626"><div class="kn" style="color:#dc2626">'+scd+'</div><div class="kl">Scadute</div></div>';
  h+='<div class="kc" style="border-top:3px solid #7c3aed"><div class="kn" style="color:#7c3aed">'+daA+'</div><div class="kl">F24 da autorizzare</div></div>';
  h+='<div class="kc" style="border-top:3px solid #059669"><div class="kn" style="color:#059669;font-size:18px">'+cur(tot)+'</div><div class="kl">Totale mese corrente</div></div>';
  h+='</div>';

  // Filtri + bottone nuovo
  h+='<div class="abar"><div class="flt">';
  h+='<select class="fi" id="fCli">'+opC+'</select>';
  h+='<select class="fi" id="fTip">'+opT+'</select>';
  h+='<input type="month" class="fi" id="fMes" value="'+xe(fMese)+'">';
  var fStato=ST.fStato||"";
  h+='<select class="fi" id="fSta">';
  h+='<option value=""'+(fStato===""?' selected':'')+'>Tutte</option>';
  h+='<option value="non_scadute"'+(fStato==="non_scadute"?' selected':'')+'>Non scadute</option>';
  h+='<option value="scadute"'+(fStato==="scadute"?' selected':'')+'>Scadute</option>';
  h+='<option value="urgenti"'+(fStato==="urgenti"?' selected':'')+'>Urgenti (&le;7gg)</option>';
  h+='</select>';
  // Filtro per numero atto - sempre visibile, select + tutti gli atti presenti
  var fAtto=ST.fAtto||"";
  var attiDistinti={};
  ST.sc.forEach(function(s){
    if(s.rifAtt) attiDistinti[s.rifAtt]=true;
    else if(s.pianoId) attiDistinti[s.pianoId]=true;
    else if(s.numAtto) attiDistinti[s.numAtto]=true;
  });
  var attiKeys=Object.keys(attiDistinti).sort();
  if(attiKeys.length){
    h+='<select class="fi" id="fAtt" title="Filtra per codice atto">';
    h+='<option value=""'+(fAtto===""?' selected':'')+'>Tutti gli atti</option>';
    attiKeys.forEach(function(a){
      h+='<option value="'+xe(a)+'"'+(fAtto===a?' selected':'')+'>'+xe(a)+'</option>';
    });
    h+='</select>';
  }else{
    h+='<input class="fi" id="fAtt" type="text" placeholder="Codice atto..." value="'+xe(fAtto)+'" style="min-width:160px" title="Filtra per codice atto">';
  }

  if(!autL.length){
    h+='<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:20px">Nessuna autorizzazione registrata.</td></tr>';

function openModificaPiano(pianoId){
  var old=document.getElementById("w-mod-piano");
  if(old) document.body.removeChild(old);

  var rate=ST.sc.filter(function(s){return s.pianoId===pianoId;})
    .slice().sort(function(a,b){return a.rataNum-b.rataNum;});
  if(!rate.length){
    showNtf("Nessuna rata trovata per il piano: "+pianoId,true);
    return;
  }
  var prima=rate[0];
  var cn=prima.cn||"";
  var nRate=rate.length;
  var cap=prima.quotaCapitale!==undefined?prima.quotaCapitale:prima.importo;
  var int_=prima.quotaInteressi||0;

  // Salva pianoId in variabile globale per uso nei bottoni
  window._currentPianoId = pianoId;

  var wrap=document.createElement("div");
  wrap.id="w-mod-piano";

  var html='<div class="ov"><div class="modal modal-lg">';
  html+='<div class="mhdr">';
  html+='<span class="mhdr-t">&#128203; Piano: '+xe(pianoId)+'</span>';
  html+='<button class="mcls" id="mp-cls-btn">&#10005;</button>';
  html+='</div>';
  html+='<div class="mbdy">';

  // Info piano
  html+='<div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:#64748b">';
  html+='<strong>Cliente:</strong> '+xe(cn);
  html+=' &nbsp;|&nbsp; <strong>Atto:</strong> <span style="font-family:monospace;color:#1e3a6e;font-weight:700">'+xe(pianoId)+'</span>';
  html+=' &nbsp;|&nbsp; <strong>Rate:</strong> '+nRate;
  html+=' &nbsp;|&nbsp; <strong>Q.Cap:</strong> '+cur(cap)+' &nbsp;|&nbsp; <strong>Q.Int:</strong> '+cur(int_);
  html+='</div>';

  // Modifica TUTTE
  html+='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px 16px;margin-bottom:16px">';
  html+='<div class="sec-title" style="color:#1e40af;border-color:#bfdbfe;margin-bottom:10px">Modifica tutte le '+nRate+' rate</div>';
  html+='<div class="fr2">';
  html+='<div><label class="lbl">Quota capitale (euro)</label>';
  html+='<input class="inp" type="number" step="0.01" min="0" id="mpg-cap" value="'+cap+'"></div>';
  html+='<div><label class="lbl">Quota interessi (euro)</label>';
  html+='<input class="inp" type="number" step="0.01" min="0" id="mpg-int" value="'+int_+'"></div>';
  html+='</div><div class="fr2">';
  html+='<div><label class="lbl">Modalita pagamento</label>';
  html+='<select class="inp" id="mpg-mod">';
  MOD.forEach(function(m){html+='<option'+(prima.mod===m?' selected':'')+'>'+xe(m)+'</option>';});
  html+='</select></div>';
  html+='<div><label class="lbl">Preavviso</label>';
  html+='<select class="inp" id="mpg-pre">';
  PRE.forEach(function(p){html+='<option value="'+p+'"'+(prima.pre===p?' selected':'')+'>'+p+' gg</option>';});
  html+='</select></div></div>';
  html+='<button class="btn-blu" id="mp-apply-all-btn">&#9989; Applica a tutte le '+nRate+' rate</button>';
  html+='</div>';

  // Tabella rate singole
  html+='<div class="sec-title">Modifica singola rata &nbsp;<small style="color:#64748b;font-weight:400;text-transform:none;letter-spacing:0">Modifica i campi e clicca Salva sulla riga corrispondente</small></div>';
  html+='<div style="overflow-x:auto;max-height:340px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px">';
  html+='<table style="min-width:640px"><thead><tr style="background:#1e3a6e">';
  html+='<th>Rata</th><th>Scadenza</th><th>Q.Cap (euro)</th><th>Q.Int (euro)</th><th>Totale</th><th>Note</th><th>Salva rata</th>';
  html+='</tr></thead><tbody>';

  rate.forEach(function(s){
    var sc=s.quotaCapitale!==undefined?s.quotaCapitale:s.importo;
    var si2=s.quotaInteressi||0;
    var sid=s.id;
    html+='<tr id="row-'+xe(sid)+'">';
    html+='<td style="font-weight:700;color:#7c3aed;white-space:nowrap">'+s.rataNum+'/'+nRate+'</td>';
    html+='<td><input class="inp mpr-dt" type="date" data-sid="'+xe(sid)+'" value="'+xe(s.data)+'" style="padding:4px 6px;font-size:11px;width:125px"></td>';
    html+='<td><input class="inp mpr-ca" type="number" step="0.01" min="0" data-sid="'+xe(sid)+'" value="'+sc+'" style="padding:4px 6px;font-size:11px;width:90px"></td>';
    html+='<td><input class="inp mpr-in" type="number" step="0.01" min="0" data-sid="'+xe(sid)+'" value="'+si2+'" style="padding:4px 6px;font-size:11px;width:90px"></td>';
    html+='<td class="mpr-to" data-sid="'+xe(sid)+'" style="font-weight:800;color:#1e3a6e;font-size:12px;white-space:nowrap">'+cur(sc+si2)+'</td>';
    html+='<td><input class="inp mpr-no" data-sid="'+xe(sid)+'" value="'+xe(s.note||"")+'" style="padding:4px 6px;font-size:11px;width:120px"></td>';
    html+='<td><button class="btn-sm-e mpr-sv-btn" data-sid="'+xe(sid)+'">Salva</button></td>';
    html+='</tr>';
  });

  html+='</tbody></table></div>';
  html+='</div>';
  html+='<div class="mft">';
  html+='<button id="mp-del-all-btn" class="btn-sm-d" style="padding:8px 14px;margin-right:auto">&#128465; Elimina intero piano</button>';
  html+='<button class="btn-sec" id="mp-close-btn">Chiudi</button>';
  html+='</div></div></div>';

  wrap.innerHTML=html;
  document.body.appendChild(wrap);

  // ---- BINDING ----

  // Chiudi
  function chiudiPiano(){
    var w=document.getElementById("w-mod-piano");
    if(w) document.body.removeChild(w);
    render();
  }
  document.getElementById("mp-cls-btn").onclick=chiudiPiano;
  document.getElementById("mp-close-btn").onclick=chiudiPiano;

  // Aggiorna totale riga in real-time
  wrap.querySelectorAll(".mpr-ca,.mpr-in").forEach(function(inp){
    inp.oninput=function(){
      var sid=inp.dataset.sid;
      var caEl=wrap.querySelector(".mpr-ca[data-sid='"+sid+"']");
      var inEl=wrap.querySelector(".mpr-in[data-sid='"+sid+"']");
      var toEl=wrap.querySelector(".mpr-to[data-sid='"+sid+"']");
      if(toEl){
        var c=parseFloat(caEl?caEl.value:0)||0;
        var i=parseFloat(inEl?inEl.value:0)||0;
        toEl.textContent=cur(c+i);
      }
    };
  });

  // Salva singola rata
  wrap.querySelectorAll(".mpr-sv-btn").forEach(function(btn){
    btn.onclick=function(){
      var sid=btn.dataset.sid;
      var s=ST.sc.find(function(x){return x.id===sid;});
      if(!s){showNtf("Rata non trovata.",true);return;}
      var dtEl=wrap.querySelector(".mpr-dt[data-sid='"+sid+"']");
      var caEl=wrap.querySelector(".mpr-ca[data-sid='"+sid+"']");
      var inEl=wrap.querySelector(".mpr-in[data-sid='"+sid+"']");
      var noEl=wrap.querySelector(".mpr-no[data-sid='"+sid+"']");
      if(!dtEl||!dtEl.value){alert("Inserire la data di scadenza.");return;}
      var newCap=parseFloat(caEl?caEl.value:s.quotaCapitale)||0;
      var newInt=parseFloat(inEl?inEl.value:0)||0;
      var uNome=ST.user?ST.user.nome||ST.user.name||ST.user.id:"";
      var updated=Object.assign({},s,{
        data:dtEl.value,
        importo:newCap+newInt,
        quotaCapitale:newCap,
        quotaInteressi:newInt,
        note:noEl?noEl.value:s.note,
        pianoId:pianoId,
        numAtto:pianoId,
        modificatoDa:uNome,
        modificatoIl:nowStr()
      });
      ST.sc=ST.sc.map(function(x){return x.id===sid?updated:x;});
      fbSaveScadenza(updated);
      btn.textContent="Salvato!";
      btn.style.background="#dcfce7";
      btn.style.color="#15803d";
      btn.style.borderColor="#bbf7d0";
      setTimeout(function(){
        if(btn&&btn.parentNode){
          btn.textContent="Salva";
          btn.style.background="";
          btn.style.color="";
          btn.style.borderColor="";
        }
      },2000);
      showNtf("Rata "+s.rataNum+" salvata.");
    };
  });

  // Applica a tutte
  document.getElementById("mp-apply-all-btn").onclick=function(){
    var newCap=parseFloat((document.getElementById("mpg-cap")||{}).value)||0;
    var newInt=parseFloat((document.getElementById("mpg-int")||{}).value)||0;
    var newMod=(document.getElementById("mpg-mod")||{}).value||"Modello F24";
    var newPre=parseInt((document.getElementById("mpg-pre")||{}).value)||10;
    if(newCap<0){alert("Inserire un importo valido.");return;}
    var rateFresh=ST.sc.filter(function(s){return s.pianoId===pianoId;});
    if(!rateFresh.length){showNtf("Nessuna rata trovata.",true);return;}
    if(!confirm("Applicare le modifiche a tutte le "+rateFresh.length+" rate?"))return;
    var uNome=ST.user?ST.user.nome||ST.user.name||ST.user.id:"";
    var now=nowStr();
    var batch={};
    rateFresh.forEach(function(s){
      var updated=Object.assign({},s,{
        importo:newCap+newInt,
        quotaCapitale:newCap,
        quotaInteressi:newInt,
        mod:newMod,
        pre:newPre,
        pianoId:pianoId,
        numAtto:pianoId,
        modificatoDa:uNome,
        modificatoIl:now
      });
      ST.sc=ST.sc.map(function(x){return x.id===s.id?updated:x;});
      batch[s.id]=updated;
    });
    // Batch write
    db().ref("scadenze").once("value").then(function(snap){
      var existing=snap.val()||{};
      Object.assign(existing,batch);
      db().ref("scadenze").set(existing);
    });
    chiudiPiano();
    showNtf("Tutte le "+rateFresh.length+" rate aggiornate.");
  };

  // Elimina intero piano
  document.getElementById("mp-del-all-btn").onclick=function(){
    var rateFresh=ST.sc.filter(function(s){return s.pianoId===pianoId;});
    if(!rateFresh.length){showNtf("Nessuna rata trovata.",true);return;}
    if(!confirm("Eliminare TUTTE le "+rateFresh.length+" rate del piano "+pianoId+"?\nQuesta operazione non e reversibile."))return;
    var nEl=rateFresh.length;
    // Elimina ogni rata con remove() individuale
    rateFresh.forEach(function(s){
      ST.sc=ST.sc.filter(function(x){return x.id!==s.id;});
      db().ref("scadenze/"+s.id).remove();
    });
    chiudiPiano();
    showNtf("Piano eliminato: "+nEl+" rate rimosse.");
  };
}

    cap:    parseFloat((document.getElementById("pi-cap")||{}).value)||0,
    int_:   parseFloat((document.getElementById("pi-int")||{}).value)||0,
    tip:    (document.getElementById("pi-tip")||{}).value||"Rateizzazione AdER",
    pre:    parseInt((document.getElementById("pi-pre")||{}).value)||10
  };

function calcolaDatePiano(data1,nRate,cadenza){
  var date=[];
  var d=new Date(data1+"T12:00:00");
  for(var i=0;i<nRate;i++){
    if(i>0){
      var mesi=cadenza==="mensile"?1:cadenza==="bimestrale"?2:3;
      d=new Date(d);
      d.setMonth(d.getMonth()+mesi);
    }
    // Formatta come YYYY-MM-DD
    var y=d.getFullYear();
    var m=String(d.getMonth()+1).padStart(2,"0");
    var g=String(d.getDate()).padStart(2,"0");
    date.push(y+"-"+m+"-"+g);
  }
  return date;
}

function generaPiano(){
  var d=leggiDatiPiano();
  var errEl=document.getElementById("pi-err");
  // Sanitizza atto: rimuove caratteri non validi per Firebase key
  d.atto = d.atto.replace(/[.#$\[\]\/]/g,'-');
  if(!d.cid||!d.atto||!d.nRate||!d.data1||d.cap<=0||!d.pre){
    if(errEl){errEl.textContent="Compilare tutti i campi obbligatori: Cliente, Riferimento atto, Rate, Data prima rata, Quota capitale.";errEl.classList.remove("dn");}
    return;
  }
  // Controlla se esiste gia un piano con stesso atto
  var esistente=ST.sc.filter(function(s){return s.pianoId===d.atto;});
  if(esistente.length){
    if(!confirm("Esiste gia un piano con il numero atto \""+d.atto+"\" ("+esistente.length+" rate). Continuare aggiungendo altre rate?"))return;
  }
  var clientiAll=getAllClienti();
  var c2=clientiAll.find(function(c){return c.cid===d.cid;});
  var cn=c2?c2.name:"";
  var uNome=ST.user?ST.user.nome||ST.user.name||ST.user.id:"";
  var date=calcolaDatePiano(d.data1,d.nRate,d.cad);
  var totRata=d.cap+d.int_;
  var now=nowStr();
  var nuoveSc=date.map(function(dt,i){
    return {
      id:"S"+Date.now()+"_"+(i+1)+"_"+Math.floor(Math.random()*999),
      cid:d.cid, cn:cn, tipo:d.tip, data:dt,
      importo:totRata,
      mod:d.mod, pre:d.pre,
      note:"Rif. atto: "+d.atto,
      rataNum:i+1, rataTot:d.nRate,
      pianoId:d.atto,
      rifAtt:d.atto,      // RIFERIMENTO ATTO - campo primario
      numAtto:d.atto,         // campo extra per chiarezza
      quotaCapitale:d.cap,
      quotaInteressi:d.int_,
      aut:false, dat:"", emlSent:false,
      inseritoDa:uNome, inseritoIl:now,
      modificatoDa:"", modificatoIl:""
    };
  });
  chiudiModal("w-piano");
  // Aggiorna ST.sc localmente
  nuoveSc.forEach(function(s){ST.sc.push(s);});
  // Scrivi TUTTO il piano in un batch Firebase unico
  // cosi il listener scatta UNA SOLA VOLTA con tutti i dati
  var batchPiano={};
  nuoveSc.forEach(function(s){batchPiano[s.id]=s;});
  db().ref("scadenze").once("value").then(function(snap){
    var existing=snap.val()||{};
    Object.assign(existing, batchPiano);
    db().ref("scadenze").set(existing);
  });
  render();
  showNtf("Piano creato: "+d.nRate+" scadenze generate per atto "+d.atto);
}

    }

    var rtEl=document.getElementById("sc-ratatot");
    var rn=rnEl&&rnEl.value?parseInt(rnEl.value):0;
    var rt=rtEl&&rtEl.value?parseInt(rtEl.value):0;
    var newS={
      id: isN?uid():item.id,
      cid:cid, cn:c2?c2.name:"", tipo:tip, data:dat, importo:imp,
      mod:mod, pre:pre, note:not, rataNum:rn, rataTot:rt,
      aut: isN?false:item.aut,
      dat: isN?"":item.dat,
      emlSent: isN?false:item.emlSent,
      // CAMPI PIANO RATEAZIONE - preservati se presenti
      pianoId: isN?(rifAttVal||""):(rifAttVal||item.pianoId||""),

      inseritoIl: isN?nowStr():item.inseritoIl,
      modificatoDa: isN?"":uNome,
      modificatoIl: isN?"":nowStr()

    else ST.sc=ST.sc.map(function(s){return s.id===newS.id?newS:s;});
    render();showNtf(isN?"Scadenza inserita.":"Scadenza aggiornata.");
    fbSaveScadenza(newS);
  };
}

    h+='<td><code style="background:#f1f5f9;padding:2px 7px;border-radius:4px;font-size:11px">'+xe(c.id)+'</code></td>';
    h+='<td style="color:#64748b;font-size:11px">'+xe(c.cid)+'</td>';
    h+='<td style="font-size:11px">'+xe(c.email||"&mdash;")+'</td>';
    h+='<td><button class="btn-sm-d" data-dc="'+xe(c.id)+'">Elimina</button></td></tr>';
  });
  h+='</tbody></table></div></div>';
  h+='<div class="mft"><button class="btn-sec" id="cli-x2">Chiudi</button></div></div></div>';
  wrap.innerHTML=h;document.body.appendChild(wrap);

  function chiudi(){cl("w-cli");render();}
  function riapri(){cl("w-cli");openClienti();}
  document.getElementById("cli-x").onclick=chiudi;
  document.getElementById("cli-x2").onclick=chiudi;
  document.getElementById("cli-add").onclick=function(){
    var nm=document.getElementById("cli-nm").value.trim();
    var id=document.getElementById("cli-id").value.trim();
    var pw=document.getElementById("cli-pw").value;
    var em=document.getElementById("cli-em").value.trim();
    var er=document.getElementById("cli-err");
    if(!nm||!id||!pw){er.textContent="Compilare Nome, Username e Password.";er.classList.remove("dn");return;}
    if(ST.ut.find(function(u){return u.id===id;})||ST.utStudio.find(function(u){return u.id===id;})){
      er.textContent="Username gia esistente.";er.classList.remove("dn");return;
    }
    var newU={id:id,pw:pw,role:"client",name:nm,cid:ucid(),email:em};
    ST.ut.push(newU);fbSaveUtente(newU);riapri();showNtf("Cliente aggiunto.");
  };
  document.querySelectorAll("[data-dc]").forEach(function(b){
    b.onclick=function(){
      if(!confirm("Eliminare questo cliente?"))return;
      ST.ut=ST.ut.filter(function(u){return u.id!==b.dataset.dc;});
      fbDeleteUtente(b.dataset.dc);riapri();
    };
  });
}

  h+='<div class="fr2"><div><label class="lbl">Public Key</label><input class="inp" id="cfg-pk" value="'+xe(cfg.ejsPubKey||"")+'"></div><div><label class="lbl">Service ID</label><input class="inp" id="cfg-si" value="'+xe(cfg.ejsSvcId||"")+'"></div></div>';

// ============================================================
// NOTIFICHE
// ============================================================
function buildAuthLink(sid){
  var base=ST.cfg.appUrl||window.location.href.split("?")[0].split("#")[0];
  return base+"#auth="+sid;
}
function sendViaEmailJS(s,isF24,cli){
  var cfg=ST.cfg;
  if(!cfg.ejsPubKey||!cfg.ejsSvcId)return Promise.reject("EmailJS non configurato nelle Impostazioni.");
  var tpl=isF24?cfg.ejsTplF24:cfg.ejsTplInfo;
  if(!tpl)return Promise.reject("Template non configurato.");
  var params={to_email:cli.email,to_name:cli.name,studio_name:cfg.studioNome||"Studio Sarto Sieni",tipo:s.tipo,importo:cur(s.importo),scadenza:fmt(s.data),modalita:s.mod,note:s.note||"",auth_link:isF24?buildAuthLink(s.id):"",giorni:String(dif(s.data))};
  return fetch("https://api.emailjs.com/api/v1.0/email/send",{method:"POST",headers:{"Content-Type":"application/json","origin":"http://localhost"},body:JSON.stringify({service_id:cfg.ejsSvcId,template_id:tpl,user_id:cfg.ejsPubKey,template_params:params})}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t);});return r;});
}
function sendViaMailto(s,cli){
  var isF24=s.mod==="Modello F24";
  var corpo="Gentile "+cli.name+","
    +"\n\nScadenza: "+s.tipo+"\nImporto: "+cur(s.importo)+"\nData: "+fmt(s.data)
    +(s.note?"\nNote: "+s.note:"")
    +"\n\n"+(isF24?"Per autorizzare il pagamento F24:\n"+buildAuthLink(s.id)+"\n\n":"Il pagamento tramite "+s.mod+" e a Sua cura diretta.\n\n")
    +"Cordiali saluti,\n"+(ST.cfg.studioNome||"Studio Sarto Sieni");
  window.open("mailto:"+encodeURIComponent(cli.email)+"?subject="+encodeURIComponent("[Studio] Scadenza: "+s.tipo+" - "+fmt(s.data))+"&body="+encodeURIComponent(corpo),"_blank");
}
function markSent(sid,val){
  ST.sc=ST.sc.map(function(x){return x.id===sid?Object.assign({},x,{emlSent:val}):x;});
  var s=ST.sc.find(function(x){return x.id===sid;});if(s)fbSaveScadenza(s);
}
function openNotifiche(){
  var nonAut=ST.sc.filter(function(s){return !s.aut;});
  var daInv=nonAut.filter(function(s){var d=dif(s.data);return d>=0&&d<=s.pre&&!s.emlSent;});
  var attesa=nonAut.filter(function(s){var d=dif(s.data);return d>=0&&d>s.pre&&!s.emlSent;});
  var inviate=nonAut.filter(function(s){return s.emlSent;});
  function riga(s,tipo){
    var cli=ST.ut.find(function(u){return u.cid===s.cid;})||{};
    var emailInfo=cli.email?xe(cli.email):'<span style="color:#dc2626">Email mancante</span>';
    var btns="";
    if(tipo==="send") btns='<div class="ntf-row-btns"><button class="btn-sm-m" data-ejs="'+xe(s.id)+'">&#9993; EmailJS</button><button class="btn-sm-e" data-mto="'+xe(s.id)+'">&#128231; Mailto</button></div>';
    else if(tipo==="force") btns='<div class="ntf-row-btns"><button class="btn-sm-m" data-force="'+xe(s.id)+'">Forza invio</button></div>';
    else btns='<div class="ntf-row-btns"><button class="btn-sm-e" data-reinvia="'+xe(s.id)+'">Reinvia</button></div>';
    return '<div class="ntf-row"><div class="ntf-row-info"><div class="ntf-row-nome">'+xe(s.cn)+' &mdash; '+xe(s.tipo)+'</div>'
      +'<div class="ntf-row-det">'+fmt(s.data)+' &nbsp;|&nbsp; '+mbdg(s.mod)+' &nbsp;|&nbsp; '+cur(s.importo)+' &nbsp;|&nbsp; '+emailInfo+'</div>'
      +btns+'</div></div>';
  }
  var wrap=document.createElement("div");wrap.id="w-ntf";
  var h='<div class="ov" id="ov-ntf"><div class="modal modal-xl" style="max-width:860px">';
  h+='<div class="mhdr"><span class="mhdr-t">&#9993; Gestione notifiche email</span><button class="mcls" id="ntf-x">&#10005;</button></div>';
  h+='<div class="mbdy">';
  h+='<div class="sec-title">Da inviare ora &mdash; '+daInv.length+' scadenze nel periodo di preavviso</div>';
  if(!daInv.length){h+='<div class="warn-box">Nessuna scadenza nel periodo di preavviso. Usare Forza invio per inviare anticipatamente.</div>';}
  else{
    h+='<div class="ok-box">'+daInv.length+' scadenze pronte.</div>';
    daInv.forEach(function(s){h+=riga(s,"send");});
    h+='<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap"><button class="btn-grn" id="send-all-ejs">&#9993; Invia tutte via EmailJS</button><button class="btn-blu" id="send-all-mto">&#128231; Apri tutte via Mailto</button></div>';
  }
  if(attesa.length){h+='<div class="sec-title" style="margin-top:18px">In attesa &mdash; '+attesa.length+'</div>';attesa.forEach(function(s){h+=riga(s,"force");});}
  if(inviate.length){h+='<div class="sec-title" style="margin-top:18px">Gia notificate &mdash; '+inviate.length+'</div>';inviate.forEach(function(s){h+=riga(s,"reinvia");});}
  h+='</div><div class="mft"><button class="btn-sec" id="ntf-x2">Chiudi</button></div></div></div>';
  wrap.innerHTML=h;document.body.appendChild(wrap);
  function chiudi(){cl("w-ntf");}
  document.getElementById("ntf-x").onclick=chiudi;
  document.getElementById("ntf-x2").onclick=chiudi;
  document.querySelectorAll("[data-ejs],[data-force]").forEach(function(b){
    b.onclick=function(){
      var sid=b.dataset.ejs||b.dataset.force;
      var s=ST.sc.find(function(x){return x.id===sid;});if(!s)return;
      var cli=ST.ut.find(function(u){return u.cid===s.cid;});if(!cli||!cli.email){alert("Email cliente mancante.");return;}
      var txt=b.textContent;b.textContent="Invio...";b.disabled=true;
      sendViaEmailJS(s,s.mod==="Modello F24",cli).then(function(){markSent(s.id,true);chiudi();openNotifiche();showNtf("Email inviata.");}).catch(function(e){b.textContent=txt;b.disabled=false;alert("Errore: "+e);});
    };
  });
  document.querySelectorAll("[data-mto]").forEach(function(b){
    b.onclick=function(){var s=ST.sc.find(function(x){return x.id===b.dataset.mto;});if(!s)return;var cli=ST.ut.find(function(u){return u.cid===s.cid;});if(!cli||!cli.email){alert("Email mancante.");return;}sendViaMailto(s,cli);markSent(s.id,true);chiudi();openNotifiche();showNtf("Client email aperto.");};
  });
  document.querySelectorAll("[data-reinvia]").forEach(function(b){
    b.onclick=function(){markSent(b.dataset.reinvia,false);chiudi();openNotifiche();};
  });
  var sae=document.getElementById("send-all-ejs");
  if(sae)sae.onclick=function(){
    sae.textContent="Invio...";sae.disabled=true;
    var sent=0,errs=0;
    Promise.all(daInv.map(function(s){
      var cli=ST.ut.find(function(u){return u.cid===s.cid;});
      if(!cli||!cli.email){errs++;return Promise.resolve();}
      return sendViaEmailJS(s,s.mod==="Modello F24",cli).then(function(){sent++;markSent(s.id,true);}).catch(function(){errs++;});
    })).then(function(){chiudi();showNtf("Inviate: "+sent+(errs?" | Errori: "+errs:""),errs>0);render();});
  };
  var sam=document.getElementById("send-all-mto");
  if(sam)sam.onclick=function(){
    daInv.forEach(function(s,i){var cli=ST.ut.find(function(u){return u.cid===s.cid;});if(!cli||!cli.email)return;setTimeout(function(){sendViaMailto(s,cli);},i*800);markSent(s.id,true);});
    chiudi();showNtf("Client email aperto per "+daInv.length+" scadenze.");render();
  };
}

function buildCliente(){
  var mie=ST.sc.filter(function(s){return s.cid===ST.user.cid;}).slice().sort(function(a,b){return a.data.localeCompare(b.data);});
  var h=buildHdr(false)+'<div class="ct">';
  h+='<h2 class="pg-title">Le mie scadenze fiscali</h2>';
  h+='<p class="pg-sub">Visualizzi le scadenze a Lei intestate. Per i pagamenti F24 puo autorizzare lo Studio direttamente da questa pagina.</p>';
  h+='<div class="cg">';
  if(!mie.length){h+='<div class="empty">&#128203; Nessuna scadenza presente.<br><small style="display:block;margin-top:8px">Lo Studio inserira le scadenze di Sua competenza.</small></div>';}
  else{
    mie.forEach(function(s){
      var d=dif(s.data),scad=d<0,isF24=s.mod==="Modello F24";
      var brd=scad?"#dc2626":d<=7?"#f59e0b":"#1e3a6e";
      var az="";
      if(isF24){
        if(!s.aut&&!scad) az='<button class="btn-aut" data-au="'+xe(s.id)+'">&#9989; Autorizza pagamento F24</button>';
        else if(s.aut)    az='<div class="box-a">&#9989; Pagamento autorizzato il '+xe(s.dat)+'</div>';
        else              az='<div class="box-sc">&#9888; Scadenza superata &mdash; contattare lo Studio</div>';
      }else{
        az='<div class="box-i">&#8505; Il pagamento tramite <strong>'+xe(s.mod)+'</strong> e a Sua cura diretta.</div>';
      }
      h+='<div class="card" style="border-left-color:'+brd+'">';
      h+='<div class="card-top"><span class="card-tipo">'+xe(s.tipo)+'</span>'+bdg(s)+'</div>';
      h+='<div class="card-imp">'+cur(s.importo)+'</div>';
      if(fmtRata(s)) h+='<div class="card-row" style="color:#7c3aed;font-weight:700">&#128221; '+xe(fmtRata(s))+'</div>';
      if(fmtRata(s)) h+='<div class="card-row" style="color:#7c3aed;font-weight:700">&#128221; '+xe(fmtRata(s))+'</div>';
      h+='<div class="card-row">&#128197; Scadenza: <strong>'+fmt(s.data)+'</strong></div>';
      h+='<div class="card-row">&#128179; Modalita: <strong>'+xe(s.mod)+'</strong></div>';
      var rafCard=s.rifAtt||s.numAtto||s.pianoId||'';
      if(rafCard) h+='<div class="card-row" style="font-size:11px;color:#7c3aed">&#128203; Rif. atto: <strong>'+xe(rafCard)+'</strong></div>';
      else h+='<div class="card-row" style="font-size:11px;color:#dc2626">&#9888; Riferimento atto mancante</div>';
      if(s.note) h+='<div class="card-note">'+xe(s.note)+'</div>';
      h+=az+'</div>';
    });
  }
  h+='</div><div class="foot">Studio Sarto Sieni &ndash; Firenze &nbsp;|&nbsp; Per assistenza contattare lo Studio</div></div>';
  return h;
}
function bindCliente(){
  document.getElementById("h-out").onclick=function(){ST.user=null;lsS("ss_user",null);render();};
  var hBk=document.getElementById("h-bk");if(hBk)hBk.onclick=eseguiBackup;
  var hRp=document.getElementById("h-rp");if(hRp)hRp.onclick=eseguiRipristino;
  document.querySelectorAll("[data-au]").forEach(function(b){
    b.onclick=function(){var s=ST.sc.find(function(x){return x.id===b.dataset.au;});if(s)openConfirm(s);};
  });
}

function openConfirm(s){
  var now=new Date().toLocaleString("it-IT");
  var wrap=document.createElement("div");wrap.id="w-aut";
  var h='<div class="ov"><div class="modal modal-sm">';
  h+='<div class="mhdr"><span class="mhdr-t">Conferma autorizzazione pagamento</span><button class="mcls" id="aut-x">&#10005;</button></div>';
  h+='<div class="mbdy">';
  h+='<p style="font-size:13px;margin-bottom:14px;line-height:1.6">Con la presente, Lei autorizza formalmente lo <strong>Studio Sarto Sieni</strong> ad effettuare il seguente pagamento per Suo conto:</p>';
  h+='<div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:14px;font-size:13px;line-height:2">';
  h+='<div><strong>Tipologia:</strong> '+xe(s.tipo)+'</div>';
  var rafC=s.rifAtt||s.numAtto||s.pianoId||'';
  if(rafC) h+='<div><strong>Riferimento atto:</strong> <span style="font-family:monospace;color:#1e3a6e">'+xe(rafC)+'</span></div>';
  if(fmtRata(s)) h+='<div><strong>Rata:</strong> <span style="color:#7c3aed;font-weight:700">'+xe(fmtRata(s))+'</span></div>';
  var rafC=s.rifAtt||s.numAtto||s.pianoId||'';
  if(rafC) h+='<div><strong>Riferimento atto:</strong> <span style="font-family:monospace;color:#1e3a6e">'+xe(rafC)+'</span></div>';
  if(fmtRata(s)) h+='<div><strong>Rata:</strong> <span style="color:#7c3aed;font-weight:700">'+xe(fmtRata(s))+'</span></div>';
  h+='<div><strong>Importo:</strong> <span style="font-size:16px;font-weight:800;color:#1e3a6e">'+cur(s.importo)+'</span></div>';
  h+='<div><strong>Scadenza:</strong> '+fmt(s.data)+'</div>';
  h+='<div><strong>Modalita:</strong> '+xe(s.mod)+'</div>';
  if(s.note) h+='<div><strong>Riferimento:</strong> '+xe(s.note)+'</div>';
  h+='</div>';
  h+='<p style="font-size:11px;color:#64748b;line-height:1.5">Cliccando Confermo verranno registrati data e ora: <strong>'+xe(now)+'</strong></p>';
  h+='</div><div class="mft"><button class="btn-sec" id="aut-no">Annulla</button><button class="btn-blu" id="aut-si">&#9989; Confermo il pagamento</button></div></div></div>';
  wrap.innerHTML=h;document.body.appendChild(wrap);
  function chiudi(){cl("w-aut");}
  document.getElementById("aut-x").onclick=chiudi;
  document.getElementById("aut-no").onclick=chiudi;
  document.getElementById("aut-si").onclick=function(){
    var updated=Object.assign({},s,{aut:true,dat:now});
    ST.sc=ST.sc.map(function(x){return x.id===s.id?updated:x;});
    chiudi();render();fbSaveScadenza(updated);
  };
}
